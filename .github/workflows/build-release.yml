name: Build and publish Windows installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: c2-video-downloader-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Run tests
        shell: powershell
        run: |
          python -m pip install pytest
          python -m pytest -q

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: powershell
        run: .\build_installer.ps1

      - name: Read application version
        id: version
        shell: powershell
        run: |
          $version = python -c "from app_config import APP_VERSION; print(APP_VERSION)"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: C2VideoDownloader-${{ steps.version.outputs.version }}
          path: |
            installer/C2VideoDownloaderSetup.exe
            installer/SHA256SUMS.txt

      - name: Create or update GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path Variable:PSNativeCommandUseErrorActionPreference) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          git fetch --tags --force
          if ($LASTEXITCODE -ne 0) {
            throw "Falha ao buscar as tags do repositório."
          }

          git show-ref --verify --quiet "refs/tags/$env:TAG"
          $tagExists = ($LASTEXITCODE -eq 0)

          if ($tagExists) {
            git tag -f $env:TAG $env:GITHUB_SHA
            if ($LASTEXITCODE -ne 0) {
              throw "Falha ao atualizar a tag $env:TAG."
            }
            git push origin "refs/tags/$env:TAG" --force
            if ($LASTEXITCODE -ne 0) {
              throw "Falha ao publicar a tag atualizada $env:TAG."
            }
          }
          else {
            git tag $env:TAG $env:GITHUB_SHA
            if ($LASTEXITCODE -ne 0) {
              throw "Falha ao criar a tag $env:TAG."
            }
            git push origin "refs/tags/$env:TAG"
            if ($LASTEXITCODE -ne 0) {
              throw "Falha ao publicar a tag $env:TAG."
            }
          }

          cmd.exe /d /c "gh release view `"$env:TAG`" --repo `"$env:GITHUB_REPOSITORY`" >nul 2>&1"
          $releaseExists = ($LASTEXITCODE -eq 0)

          if (-not $releaseExists) {
            gh release create $env:TAG `
              --repo $env:GITHUB_REPOSITORY `
              --title "C² Video Downloader $env:VERSION" `
              --notes "Instalador automático para Windows 64 bits. Inclui atualização interna do aplicativo, yt-dlp nightly e Deno." `
              --latest
            if ($LASTEXITCODE -ne 0) {
              throw "Falha ao criar o GitHub Release $env:TAG."
            }
          }

          gh release upload $env:TAG `
            installer/C2VideoDownloaderSetup.exe `
            installer/SHA256SUMS.txt `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Falha ao enviar os arquivos para o GitHub Release $env:TAG."
          }
