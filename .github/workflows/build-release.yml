name: Build and publish Windows installer

# Repositório público: publicação automática da versão estável.
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: c2-video-downloader-release
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Run automated tests
        shell: pwsh
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest -q

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build application and installer
        shell: pwsh
        run: .\build_installer.ps1

      - name: Read application version
        id: version
        shell: pwsh
        run: |
          $version = python -c "from app_config import APP_VERSION; print(APP_VERSION)"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: C2VideoDownloader-${{ steps.version.outputs.version }}
          path: |
            installer/C2VideoDownloaderSetup.exe
            installer/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"

          gh release view $env:TAG --repo $env:GITHUB_REPOSITORY *> $null
          $releaseExists = ($LASTEXITCODE -eq 0)

          if (-not $releaseExists) {
            gh release create $env:TAG `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title "C² Video Downloader $env:VERSION" `
              --notes "Instalador automático para Windows 64 bits. Inclui download em lote de categorias do JW.ORG, atualização interna do aplicativo, yt-dlp nightly e Deno." `
              --latest
            if ($LASTEXITCODE -ne 0) {
              throw "Falha ao criar a Release $env:TAG."
            }
          }

          gh release upload $env:TAG `
            installer/C2VideoDownloaderSetup.exe `
            installer/SHA256SUMS.txt `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Falha ao enviar os arquivos para a Release $env:TAG."
          }
